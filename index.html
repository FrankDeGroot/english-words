<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #f4f4f6;
      --bg-secondary: #fff;
      --bg-tertiary: #fafafa;
      --bg-accent: #f0f0ff;
      --bg-filled: #ede9fe;
      --text-primary: #222;
      --text-secondary: #1a1a2e;
      --text-muted: #888;
      --text-light: #666;
      --text-tag: #333;
      --text-filled: #4338ca;
      --border-light: #ddd;
      --border-neutral: #e0e0e8;
      --border-accent: #a5b4fc;
      --border-index: #aaa;
      --accent-color: #6366f1;
      --shadow: rgba(0,0,0,.08);
      --transition: .15s;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1a1a2e;
        --bg-secondary: #2d2d3d;
        --bg-tertiary: #3a3a4a;
        --bg-accent: #4a3f7f;
        --bg-filled: #5a4f9f;
        --text-primary: #e8e8f0;
        --text-secondary: #f0f0f8;
        --text-muted: #aaa;
        --text-light: #999;
        --text-tag: #ddd;
        --text-filled: #c4b5fd;
        --border-light: #555;
        --border-neutral: #4a4a5a;
        --border-accent: #7c3aed;
        --border-index: #666;
        --shadow: rgba(0,0,0,.3);
      }
    }

    /* Forced dark — overrides media query */
    html.dark-mode {
      --bg-primary: #1a1a2e;
      --bg-secondary: #2d2d3d;
      --bg-tertiary: #3a3a4a;
      --bg-accent: #4a3f7f;
      --bg-filled: #5a4f9f;
      --text-primary: #e8e8f0;
      --text-secondary: #f0f0f8;
      --text-muted: #aaa;
      --text-light: #999;
      --text-tag: #ddd;
      --text-filled: #c4b5fd;
      --border-light: #555;
      --border-neutral: #4a4a5a;
      --border-accent: #7c3aed;
      --border-index: #666;
      --shadow: rgba(0,0,0,.3);
    }

    /* Forced light — overrides media query */
    html.light-mode {
      --bg-primary: #f4f4f6;
      --bg-secondary: #fff;
      --bg-tertiary: #fafafa;
      --bg-accent: #f0f0ff;
      --bg-filled: #ede9fe;
      --text-primary: #222;
      --text-secondary: #1a1a2e;
      --text-muted: #888;
      --text-light: #666;
      --text-tag: #333;
      --text-filled: #4338ca;
      --border-light: #ddd;
      --border-neutral: #e0e0e8;
      --border-accent: #a5b4fc;
      --border-index: #aaa;
      --shadow: rgba(0,0,0,.08);
    }

    body {
      font-family: system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
      transition: background .3s, color .3s;
    }

    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border-light);
      border-radius: 8px;
      padding: .5rem .75rem;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 2.5rem;
      height: 2.5rem;
      transition: background .3s, border-color .3s;
      box-shadow: 0 2px 4px var(--shadow);
    }
    .theme-toggle:hover { background: var(--bg-accent); }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
    }

    .controls {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      max-width: 800px;
      transition: background .3s;
    }

    .field label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--text-light);
      margin-bottom: .4rem;
    }

    #letters-input {
      font-size: 1.1rem;
      padding: .45rem .7rem;
      border: 2px solid var(--border-light);
      border-radius: 8px;
      width: 100%;
      max-width: 320px;
      outline: none;
      transition: border-color var(--transition), background .3s, color .3s;
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    #letters-input:focus { border-color: var(--accent-color); }

    .slider-row {
      display: flex;
      align-items: center;
      gap: .75rem;
    }

    #length-slider {
      flex: 1;
      max-width: 280px;
      accent-color: var(--accent-color);
      cursor: pointer;
    }

    #length-display {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--accent-color);
      min-width: 2ch;
      text-align: center;
    }

    #position-filters {
      display: flex;
      flex-wrap: wrap;
      gap: .35rem;
    }

    .pos-input {
      width: 2.2rem;
      height: 2.4rem;
      text-align: center;
      font-size: 1.1rem;
      font-weight: 600;
      border: 2px solid var(--border-light);
      border-radius: 6px;
      outline: none;
      text-transform: lowercase;
      transition: border-color var(--transition), background var(--transition), color .3s;
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }
    .pos-input:focus { border-color: var(--accent-color); background: var(--bg-accent); }
    .pos-input.filled { border-color: var(--accent-color); background: var(--bg-filled); color: var(--text-filled); }

    .pos-index {
      width: 2.2rem;
      text-align: center;
      font-size: .65rem;
      color: var(--border-index);
      margin-top: .15rem;
    }

    .pos-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #status {
      font-size: .85rem;
      color: var(--text-muted);
      min-height: 1.2em;
    }

    #results {
      margin-top: 1.5rem;
      max-width: 800px;
    }

    #results-count {
      font-size: .85rem;
      color: var(--text-muted);
      margin-bottom: .75rem;
    }

    #words-container {
      display: flex;
      flex-wrap: wrap;
      gap: .4rem;
    }

    .word-tag {
      background: var(--bg-secondary);
      border: 1px solid var(--border-neutral);
      border-radius: 6px;
      padding: .25rem .6rem;
      font-size: .95rem;
      font-family: 'Courier New', monospace;
      color: var(--text-tag);
      transition: background .1s, border-color .1s;
    }
    .word-tag:hover { background: var(--bg-accent); border-color: var(--border-accent); }
  </style>
</head>
<body>
  <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  <h1>Word Finder</h1>

  <div class="controls">
    <div class="field">
      <label for="letters-input">Available letters</label>
      <input id="letters-input" type="text" placeholder="e.g. wordtrails" autocomplete="off" spellcheck="false" autocapitalize="none">
    </div>

    <div class="field">
      <label>Word length</label>
      <div class="slider-row">
        <input id="length-slider" type="range" min="3" max="30" value="3">
        <span id="length-display">3</span>
      </div>
    </div>

    <div class="field">
      <label>Position filter <span style="font-weight:400;text-transform:none;letter-spacing:0">(leave blank to match any)</span></label>
      <div id="position-filters"></div>
    </div>

    <div id="status">Loading word list…</div>
  </div>

  <div id="results">
    <div id="results-count"></div>
    <div id="words-container"></div>
  </div>

  <script>
    // ── Theme toggle logic ──────────────────────────────────────────
    const themeToggle = document.getElementById('theme-toggle');
    const html = document.documentElement;
    const THEME_KEY = 'word-finder-theme';

    const THEMES = [
      { key: 'system', icon: '🌓', title: 'System theme — switch to dark' },
      { key: 'dark',   icon: '🌙', title: 'Dark mode — switch to light' },
      { key: 'light',  icon: '☀️', title: 'Light mode — switch to system' },
    ];

    function applyTheme(key) {
      html.classList.toggle('dark-mode',  key === 'dark');
      html.classList.toggle('light-mode', key === 'light');
      html.style.colorScheme = key === 'dark' ? 'dark' : key === 'light' ? 'light' : 'light dark';
      const t = THEMES.find(t => t.key === key);
      themeToggle.textContent = t.icon;
      themeToggle.title = t.title;
      themeToggle.setAttribute('aria-label', t.title);
    }

    function initTheme() {
      applyTheme(localStorage.getItem(THEME_KEY) || 'system');
    }

    themeToggle.addEventListener('click', () => {
      const current = localStorage.getItem(THEME_KEY) || 'system';
      const idx = THEMES.findIndex(t => t.key === current);
      const next = THEMES[(idx + 1) % THEMES.length].key;
      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    initTheme();

    const MAX_DISPLAY = 500;

    let allWords = [];
    let ready = false;

    const lettersInput  = document.getElementById('letters-input');
    const lengthSlider  = document.getElementById('length-slider');
    const lengthDisplay = document.getElementById('length-display');
    const posFilters    = document.getElementById('position-filters');
    const statusEl      = document.getElementById('status');
    const countEl       = document.getElementById('results-count');
    const wordsEl       = document.getElementById('words-container');

    // ── Load word list ──────────────────────────────────────────────
    fetch('word_trails.txt')
      .then(r => r.text())
      .then(text => {
        allWords = text.split('\n').map(w => w.trim()).filter(Boolean);
        ready = true;
        buildPositionInputs(+lengthSlider.value);
        runFilter();
      })
      .catch(() => {
        statusEl.textContent = 'Failed to load word_trails.txt – serve this file from the same directory.';
      });

    // ── Position inputs ─────────────────────────────────────────────
    function buildPositionInputs(n) {
      const prev = [...posFilters.querySelectorAll('.pos-input')].map(el => el.value);
      posFilters.innerHTML = '';
      for (let i = 0; i < n; i++) {
        const cell = document.createElement('div');
        cell.className = 'pos-cell';

        const inp = document.createElement('input');
        inp.type = 'text';
        inp.maxLength = 1;
        inp.className = 'pos-input';
        inp.dataset.index = i;
        inp.value = prev[i] || '';
        if (inp.value) inp.classList.add('filled');

        inp.addEventListener('focus', () => inp.select());
        inp.addEventListener('input', () => {
          const rawLetters = lettersInput.value.trim().toLowerCase().replace(/[^a-z]/g, '');
          const ch = inp.value.toLowerCase().replace(/[^a-z]/g, '').slice(-1);
          inp.value = (ch && rawLetters && !rawLetters.includes(ch)) ? '' : ch;
          inp.classList.toggle('filled', inp.value !== '');
          runFilter();
          // auto-advance
          if (inp.value) {
            const next = posFilters.querySelector(`.pos-input[data-index="${i + 1}"]`);
            if (next) next.focus();
          }
        });

        inp.addEventListener('keydown', e => {
          if (e.key === 'Backspace' && inp.value === '') {
            const prev = posFilters.querySelector(`.pos-input[data-index="${i - 1}"]`);
            if (prev) { prev.focus(); prev.value = ''; prev.classList.remove('filled'); runFilter(); }
          } else if (e.key === 'ArrowLeft') {
            const p = posFilters.querySelector(`.pos-input[data-index="${i - 1}"]`);
            if (p) p.focus();
          } else if (e.key === 'ArrowRight') {
            const nx = posFilters.querySelector(`.pos-input[data-index="${i + 1}"]`);
            if (nx) nx.focus();
          }
        });

        const idx = document.createElement('div');
        idx.className = 'pos-index';
        idx.textContent = i + 1;

        cell.append(inp, idx);
        posFilters.append(cell);
      }
    }

    // ── Filter logic ────────────────────────────────────────────────
    function letterCounts(str) {
      const c = {};
      for (const ch of str) c[ch] = (c[ch] || 0) + 1;
      return c;
    }

    function fitsInBag(word, bag) {
      const wc = letterCounts(word);
      for (const ch of Object.keys(wc)) {
        if ((wc[ch] || 0) > (bag[ch] || 0)) return false;
      }
      return true;
    }

    function runFilter() {
      if (!ready) return;

      const length     = +lengthSlider.value;
      const rawLetters = lettersInput.value.trim().toLowerCase().replace(/[^a-z]/g, '');
      const bag        = rawLetters ? letterCounts(rawLetters) : null;
      const pattern    = [...posFilters.querySelectorAll('.pos-input')].map(el => el.value.toLowerCase());

      if (!rawLetters) {
        statusEl.textContent = `${allWords.length.toLocaleString()} words loaded`;
        countEl.textContent = '';
        wordsEl.innerHTML = '';
        return;
      }

      const matched = [];
      for (const word of allWords) {
        if (word.length !== length) continue;
        // position filter
        let ok = true;
        for (let i = 0; i < pattern.length; i++) {
          if (pattern[i] && word[i] !== pattern[i]) { ok = false; break; }
        }
        if (!ok) continue;
        // bag filter (only when letters provided)
        if (bag && !fitsInBag(word, bag)) continue;
        matched.push(word);
      }

      const total = matched.length;
      statusEl.textContent = total === 0
        ? 'No matches'
        : `${total.toLocaleString()} match${total === 1 ? '' : 'es'}${total > MAX_DISPLAY ? ` — showing first ${MAX_DISPLAY}` : ''}`;
      countEl.textContent = '';

      wordsEl.innerHTML = '';
      const frag = document.createDocumentFragment();
      for (const w of matched.slice(0, MAX_DISPLAY)) {
        const span = document.createElement('span');
        span.className = 'word-tag';
        span.textContent = w;
        frag.append(span);
      }
      wordsEl.append(frag);
    }

    // ── Event wiring ────────────────────────────────────────────────
    lengthSlider.addEventListener('input', () => {
      const n = +lengthSlider.value;
      lengthDisplay.textContent = n;
      buildPositionInputs(n);
      runFilter();
    });

    lettersInput.addEventListener('input', () => {
      const rawLetters = lettersInput.value.trim().toLowerCase().replace(/[^a-z]/g, '');
      const letterCount = rawLetters.length;

      if (letterCount > 0) {
        lengthSlider.max = Math.max(letterCount, 3);
        lengthSlider.value = 3;
        lengthDisplay.textContent = 3;
      } else {
        lengthSlider.max = 30;
      }

      posFilters.querySelectorAll('.pos-input').forEach(el => {
        el.value = '';
        el.classList.remove('filled');
      });
      buildPositionInputs(+lengthSlider.value);
      runFilter();
    });
  </script>
</body>
</html>
